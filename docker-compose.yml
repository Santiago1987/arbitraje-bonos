services:
  mongo:
    image: mongo:7
    container_name: arbitraje-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  # Descomentar cuando quieras correr el backend en Docker
