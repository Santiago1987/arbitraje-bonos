name: Build y push a ghcr.io

on:
  push:
    branches:
      - master
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setear nombre de imagen en minúsculas
        id: img
        run: echo "name=${REPO,,}-backend" >> "$GITHUB_OUTPUT"
        env:
          REPO: ${{ github.repository }}

      - name: Login a ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build y push del backend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  build-frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setear nombre de imagen en minúsculas
        id: img
        run: echo "name=${REPO,,}-frontend" >> "$GITHUB_OUTPUT"
        env:
          REPO: ${{ github.repository }}

      - name: Login a ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build y push del frontend
        uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:latest
            ${{ env.REGISTRY }}/${{ steps.img.outputs.name }}:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
